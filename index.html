<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Master</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 500px; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { font-size: 1.5rem; color: #38bdf8; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0284c7; }
        #response { margin-top: 20px; padding: 15px; background: #334155; border-radius: 8px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>🚀 AI Task Master</h1>
        <input type="text" id="userInput" placeholder="अपना ऑर्डर यहाँ लिखें...">
        <button onclick="askAI()">Execute Order</button>
        <div id="response"></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run";
        const genAI = new GoogleGenerativeAI("AIzaSyDp4603sFYEjvIr-rW7d-Nrc8OsCCMrnNo");
        window.askAI = async () => {
            const input = document.getElementById('userInput').value;
            const resDiv = document.getElementById('response');
            if(!input) return;
            resDiv.style.display = "block";
            resDiv.innerText = "Processing Your Order... ⚡";
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(input);
                resDiv.innerText = result.response.text();
            } catch (e) { resDiv.innerText = "Error: " + e.message; }
        };
    </script>
</body>
</html>
